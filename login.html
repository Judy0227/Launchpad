<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpad</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="auth-page">
    <div class="main-container">
        <div id="loginmesssage" class="messageDiv"></div>
                <div class="login-header">
                    <div class="logo-bg"><i class="fa-solid fa-rocket"></i></div>
                    <h1>Log In</h1>
                    <p>Login to your Launchpad account</p>
                </div>
                <div class="login-form-box">
                    <form action="#" method="POST">
                        <div class="input-group">
                            <label for="email">Enter your Email</label>
                            <input type="email" id="email" name="email" placeholder="" required>
                        </div>
                        <div class="input-group">
                            <label for="password">Enter Password</label>
                            <div class="password-input-wrapper">
                                <input type="password" id="password" name="password" placeholder="" required>
                                <span class="toggle-password" data-target="password">
                                    <i class="fas fa-eye-slash"></i> <!-- Initial icon: eye-slash (hidden) -->
                                </span>
                            </div>
                        </div>
        
                        <div class="forgot-password">
                            <a href="#">Forgot Password?</a>
                        </div>
        
                        <div class="account-question">
                            <p>Don't have an Account? <a href="signup.html" class="signup-link">Sign Up</a></p>
                        </div>
        
                        <button type="submit" class="login-button" id="submit"><a href="index.html">Log In</a></button>
                    </form>
                </div>
            </div>
        
    <script src="/scripts/firebaseauth.js" type="module"></script>
    <script src="/scripts/login.js" type="module"></script>

</body>
</html>
