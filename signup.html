<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launchpad</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="auth-page">
    <div class="form-container">
    <form id="signupForm">
        <div id="signupmesssage" class="messageDiv"></div>
        <div class="login-header">
            <div class="logo-bg"><i class="fa-solid fa-rocket"></i></div>
      <h2 class="form-title">Create your Account</h2>
      <p>Join Launchpad to share and discover startup ideas</p>
        </div>

      <div class="input-group">
        <label for="firstName">Enter First Name</label>
        <input type="text" id="firstName" placeholder="John" required />
      </div>

      <div class="input-group">
        <label for="lastName">Enter Last Name</label>
        <input type="text" id="lastName" placeholder="Emmanuel" required />
      </div>

      <div class="input-group">
        <label for="email">Enter Email</label>
        <input type="email" id="email" placeholder="EmmanuelJblog@gmail.com" required />
        <span id="emailError" class="error-msg"></span>
      </div>

      <div class="input-group">
        <label for="password">Enter Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="password" placeholder="********" required/>
          <span class="toggle-password" data-target="password">
            <i class="fas fa-eye-slash"></i>
          </span>
        </div>
        <span id="passwordError" class="error-msg"></span>
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="password-input-wrapper">
          <input type="password" id="confirmPassword" placeholder="********" required/>
          <span class="toggle-password" data-target="confirmPassword">
            <i class="fas fa-eye-slash"></i>
          </span>
        </div>
        <span id="confirmError" class="error-msg"></span>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="terms" required />
        <label for="terms">Agree with the Terms and Conditions</label>
      </div>

      <div class="already-account">
        Already have an Account? <a href="login.html" class="login-link">Log In</a>
      </div>

      <button type="submit" class="signup-button" id="submit"><a href="login.html">Sign Up</a></button>
    </form>
  </div>
  <script src="/scripts/firebaseauth.js" type="module"></script>
    <script src="/scripts/signup.js" type="module"></script>
    
</body>
</html>
